# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD Pipeline — GitHub Actions
# Proyecto: Online Auction (Spring Boot + Angular)
# Capítulo 15 — Software Architecture with Spring
#
# Flujo:
#   1. [CI] Backend → Maven build + Unit Tests + Code coverage
#   2. [CI] Frontend → npm install + Angular build + Tests
#   3. [CD] Docker → Build imagen + Push a GitHub Container Registry
#   4. [CD] Summary → Reporte final del pipeline
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline — Auction App

# ─── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ─── Global env vars ───────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  # Formato: ghcr.io/TU_USUARIO/auction-backend
  IMAGE_NAME: ${{ github.repository_owner }}/auction-backend

# ─── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 1: Backend CI — Build + Test (Spring Boot / Maven)                 │
  # └─────────────────────────────────────────────────────────────────────────┘
  backend-ci:
    name: "🔧 Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código fuente
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      # 2. Configurar JDK 17
      - name: "☕ Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven           # Caché automático de dependencias Maven

      # 3. Compilar sin ejecutar tests (validación rápida)
      - name: "🏗️ Compile (skip tests)"
        working-directory: backend
        run: mvn clean compile -B

      # 4. Ejecutar tests unitarios + generar reporte de cobertura
      - name: "🧪 Run unit tests"
        working-directory: backend
        run: mvn test -B

      # 5. Subir reporte de cobertura (JaCoCo)
      - name: "📊 Upload test results"
        uses: actions/upload-artifact@v4
        if: always()             # Siempre subir, incluso si los tests fallan
        with:
          name: backend-test-results
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
          retention-days: 7

      # 6. Generar el JAR final (sin tests, ya ejecutamos arriba)
      - name: "📦 Package JAR"
        working-directory: backend
        run: mvn package -DskipTests -B

      # 7. Guardar el JAR como artifact para el job de Docker
      - name: "💾 Save JAR artifact"
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 2: Frontend CI — Build + Test (Angular / npm)                      │
  # └─────────────────────────────────────────────────────────────────────────┘
  frontend-ci:
    name: "🎨 Frontend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código fuente
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: "🟢 Set up Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Instalar dependencias
      - name: "📦 Install npm dependencies"
        working-directory: frontend
        run: npm ci --prefer-offline

      # 4. Lint (verificación de calidad del código)
      - name: "🔍 Lint check"
        working-directory: frontend
        run: npm run lint || echo "⚠️ Lint warnings detected (non-blocking)"
        continue-on-error: true

      # 5. Build de producción
      - name: "🏗️ Build Angular (production)"
        working-directory: frontend
        run: npm run build

      # 6. Tests unitarios (Chrome Headless)
      - name: "🧪 Run Angular unit tests"
        working-directory: frontend
        run: npm test
        continue-on-error: true   # No bloquear si Karma no está disponible en CI

      # 7. Guardar el build como artifact
      - name: "💾 Save Angular build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 3: Docker Build & Push a GitHub Container Registry                 │
  # │  Solo se ejecuta en push a 'main' (no en PRs)                           │
  # └─────────────────────────────────────────────────────────────────────────┘
  docker-build-push:
    name: "🐳 Docker — Build & Push"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]  # Depende de que ambos CI pasen

    # Solo publicar imagen en push a main (no en Pull Requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write              # Necesario para publicar en ghcr.io

    steps:
      # 1. Checkout
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      # 2. Descargar el JAR generado en el job de backend
      - name: "📥 Download backend JAR"
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      # 3. Configurar Docker Buildx (soporte multi-plataforma)
      - name: "🛠️ Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # 4. Login en GitHub Container Registry
      - name: "🔐 Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Token automático de GitHub Actions

      # 5. Extraer metadata para tags de la imagen (versionado automático)
      - name: "🏷️ Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag 'latest' siempre en main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag con el hash del commit (ej: sha-abc1234)
            type=sha,prefix=sha-
            # Tag con la fecha (ej: 2025-04-29)
            type=raw,value={{date 'YYYY-MM-DD'}}

      # 6. Build y Push de la imagen Docker (multi-plataforma: amd64 + arm64)
      - name: "🏗️ Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: backend                   # Contexto: carpeta backend/
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64 # Igual que en el libro (Capítulo 14)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha               # Cache de GitHub Actions (acelera builds)
          cache-to: type=gha,mode=max

      # 7. Mostrar digest de la imagen publicada
      - name: "📋 Image digest"
        run: |
          echo "✅ Image published successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 4: Pipeline Summary                                                │
  # └─────────────────────────────────────────────────────────────────────────┘
  pipeline-summary:
    name: "📋 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-build-push]
    if: always()   # Siempre ejecutar para mostrar resumen

    steps:
      - name: "📊 Generate Pipeline Summary"
        run: |
          echo "## 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Backend CI (Maven + Tests) | ${{ needs.backend-ci.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Frontend CI (Angular build) | ${{ needs.frontend-ci.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build & Push | ${{ needs.docker-build-push.result == 'success' && '✅ Pushed' || needs.docker-build-push.result == 'skipped' && '⏭️ Skipped (PR)' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
