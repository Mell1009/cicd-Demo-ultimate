name: CI-CD Pipeline

on: [push]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: "Backend: build and test"
        working-directory: backend
        run: mvn -B verify

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and Push Docker Image
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker build -t ghcr.io/${{ github.repository_owner }}/cicd-demo:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/cicd-demo:latest
