name: CI/CD Pipeline - Auction App

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/auction-backend

jobs:

  # JOB 1: Backend CI - Build + Test (Spring Boot / Maven)
  backend-ci:
    name: "Backend - Build and Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: "Compile (skip tests)"
        working-directory: cicd-demo/backend
        run: mvn clean compile -B

      - name: "Run unit tests"
        working-directory: cicd-demo/backend
        run: mvn test -B

      - name: "Upload test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: cicd-demo/backend/target/surefire-reports/
          retention-days: 7

      - name: "Package JAR"
        working-directory: cicd-demo/backend
        run: mvn package -DskipTests -B

      - name: "Save JAR artifact"
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: cicd-demo/backend/target/*.jar
          retention-days: 1

  # JOB 2: Frontend CI - Build + Test (Angular / npm)
  frontend-ci:
    name: "Frontend - Build and Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Set up Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install npm dependencies"
        working-directory: cicd-demo/frontend
        run: npm install

      - name: "Build Angular (production)"
        working-directory: cicd-demo/frontend
        run: npm run build
        continue-on-error: true

      - name: "Save Angular build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: cicd-demo/frontend/dist/
          retention-days: 7
        continue-on-error: true

  # JOB 3: Docker Build and Push - GitHub Container Registry
  # Solo se ejecuta en push a main (no en PRs)
  docker-build-push:
    name: "Docker - Build and Push"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Download backend JAR"
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: cicd-demo/backend/target/

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: "Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: cicd-demo/backend
          file: cicd-demo/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Image published"
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # JOB 4: Pipeline Summary
  pipeline-summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-build-push]
    if: always()

    steps:
      - name: "Generate Pipeline Summary"
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend CI (Maven + Tests) | ${{ needs.backend-ci.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI (Angular build) | ${{ needs.frontend-ci.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build and Push | ${{ needs.docker-build-push.result == 'success' && 'Pushed' || needs.docker-build-push.result == 'skipped' && 'Skipped (PR)' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
